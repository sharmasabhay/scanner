<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    margin: 0; padding: 16px;
    background: #0f0f0f; color: #e0e0e0;
  }
  h2 { color: #00e5a0; margin: 0 0 12px; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }

  #status {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 10px;
    background: #1a1a1a;
    border-left: 4px solid #555;
    transition: all 0.3s;
  }
  #status.ok   { border-color: #00e5a0; color: #00e5a0; }
  #status.dup  { border-color: #ff4444; color: #ff4444; }
  #status.wait { border-color: #f0a500; color: #f0a500; }

  /* Job progress bar */
  #jobBar {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .scan-slot {
    flex: 1; padding: 10px 8px; border-radius: 6px;
    background: #1a1a1a; border: 1px solid #333;
    font-size: 12px; text-align: center; transition: all 0.3s;
  }
  .scan-slot .label { color: #666; font-size: 11px; margin-bottom: 4px; }
  .scan-slot .value { color: #888; font-weight: bold; word-break: break-all; }
  .scan-slot.active { border-color: #f0a500; background: #1f1800; }
  .scan-slot.active .label { color: #f0a500; }
  .scan-slot.done { border-color: #00e5a0; background: #001a12; }
  .scan-slot.done .value { color: #00e5a0; }

  #reader { width: 100%; max-width: 500px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }

  button {
    padding: 12px 20px; font-size: 15px;
    background: #00e5a0; color: #000;
    border: none; border-radius: 6px; cursor: pointer;
    font-family: 'Courier New', monospace; font-weight: bold;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  button:active { background: #00b87a; }

  #log { margin-top: 8px; font-size: 13px; }
  .log-header { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .row {
    padding: 8px 10px; border-radius: 4px;
    margin-bottom: 4px; background: #151515;
    border-left: 3px solid #333;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px;
  }
  .row.complete { border-color: #00e5a0; }
  .row.duplicate { border-color: #ff4444; background: #1a0505; color: #ff4444; }
  .row-codes { font-size: 12px; color: #ccc; }
  .row-codes span { color: #00e5a0; }
  .row-time { font-size: 11px; color: #555; white-space: nowrap; }
  .badge {
    font-size: 10px; font-weight: bold; padding: 2px 5px;
    border-radius: 3px; background: #ff4444; color: #fff;
    white-space: nowrap; align-self: center;
  }
</style>
</head>
<body>
<h2>&#9634; QR Scanner</h2>
<div id="status">Tap Start to begin</div>

<div id="jobBar">
  <div class="scan-slot active" id="slot1">
    <div class="label">SCAN 1</div>
    <div class="value" id="slot1val">—</div>
  </div>
  <div class="scan-slot" id="slot2">
    <div class="label">SCAN 2</div>
    <div class="value" id="slot2val">—</div>
  </div>
</div>

<button id="startBtn">Start Camera</button>
<div id="reader"></div>
<div id="log">
  <div class="log-header">Completed Jobs</div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const webAppUrl = "https://script.google.com/macros/s/AKfycbwIIRXHWBJ1bHIcRyiZ1UaWLurQsqySGt83zR6CinTCvj5SLLP1Qffe7B-OV5g4Jiryvw/exec";

  const statusEl = document.getElementById('status');
  const logEl    = document.getElementById('log');
  const slot1    = document.getElementById('slot1');
  const slot2    = document.getElementById('slot2');
  const slot1val = document.getElementById('slot1val');
  const slot2val = document.getElementById('slot2val');

  let firstScan  = null;   // holds the first QR code of current job
  let lastCode   = '';     // for consecutive-duplicate check
  let lastTime   = 0;

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type || '';
  }

  function resetSlots() {
    firstScan = null;
    slot1.className = 'scan-slot active';
    slot2.className = 'scan-slot';
    slot1val.textContent = '—';
    slot2val.textContent = '—';
  }

  function onScan(code) {
    const now = Date.now();

    // --- Consecutive duplicate check ---
    if (code === lastCode && now - lastTime < 2000) return;

    // If this code is the same as the immediately previous scan in this job, reject it
    if (code === lastCode) {
      setStatus('Duplicate scan ignored: ' + code, 'dup');
      logDuplicate(code);
      lastTime = now; // reset timer
      return;
    }

    lastCode = code;
    lastTime = now;

    if (firstScan === null) {
      // ---- First scan of a job ----
      firstScan = code;
      slot1.className = 'scan-slot done';
      slot1val.textContent = code;
      slot2.className = 'scan-slot active';
      setStatus('Got Scan 1 — now scan the second code', 'wait');
    } else {
      // ---- Second scan of a job ----
      const scan1 = firstScan;
      const scan2 = code;

      slot2.className = 'scan-slot done';
      slot2val.textContent = code;
      setStatus('Sending job…', '');

      fetch(webAppUrl + '?scan1=' + encodeURIComponent(scan1) + '&scan2=' + encodeURIComponent(scan2))
        .then(r => r.text())
        .then(result => {
          if (result.trim() === 'OK') {
            setStatus('✓ Job saved: ' + scan1 + ' + ' + scan2, 'ok');
            logComplete(scan1, scan2);
          } else {
            setStatus('Server: ' + result, 'dup');
          }
          setTimeout(resetSlots, 1200);
        })
        .catch(() => {
          // no-cors fallback — can't read response
          setStatus('Sent (no-cors mode)', 'ok');
          logComplete(scan1, scan2);
          setTimeout(resetSlots, 1200);
        });
    }
  }

  function logComplete(s1, s2) {
    const row = document.createElement('div');
    row.className = 'row complete';
    row.innerHTML = `
      <div class="row-codes">
        <span>${s1}</span> &nbsp;+&nbsp; <span>${s2}</span>
      </div>
      <div class="row-time">${new Date().toLocaleTimeString()}</div>
    `;
    logEl.insertBefore(row, logEl.children[1] || null);
  }

  function logDuplicate(code) {
    const row = document.createElement('div');
    row.className = 'row duplicate';
    row.innerHTML = `
      <div class="row-codes">${code}</div>
      <span class="badge">DUP</span>
      <div class="row-time">${new Date().toLocaleTimeString()}</div>
    `;
    logEl.insertBefore(row, logEl.children[1] || null);
  }

  document.getElementById('startBtn').onclick = function() {
    setStatus('Requesting camera…');
    const scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 250 },
      onScan,
      function() {}
    ).then(function() {
      setStatus('Scan 1 of 2 — ready', 'wait');
      document.getElementById('startBtn').style.display = 'none';
    }).catch(function(err) {
      setStatus('Error: ' + err);
    });
  };
</script>
</body>
</html>
